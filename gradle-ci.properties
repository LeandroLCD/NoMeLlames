# Gradle configuration optimized for CI/CD
# This file is used automatically in GitHub Actions

# Memory optimizations
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError

# Enable configuration cache (faster on second run)
org.gradle.configuration-cache=true
org.gradle.configuration-cache.problems=warn

# Enable build cache
org.gradle.caching=true

# Parallel execution
org.gradle.parallel=true
org.gradle.workers.max=4

# Do not use daemon in CI (frees memory)
org.gradle.daemon=false

# Kotlin configuration
kotlin.incremental=true
kotlin.incremental.usePreciseJavaTracking=true
kotlin.caching.enabled=true
kotlin.compiler.execution.strategy=in-process

# Android optimizations (only compatible with AGP 9.0+)
android.enableJetifier=false
android.useAndroidX=true
android.nonTransitiveRClass=true

# Suppress unnecessary warnings
org.gradle.warning.mode=none
