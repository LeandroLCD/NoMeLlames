name: 🚀 App — Test, Build & Release

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - '.github/workflows/app-android-test-integration.yml'
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - '.github/workflows/app-android-test-integration.yml'

  workflow_dispatch:

concurrency:
  group: app-android-integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # STEP 1 — Unit Tests
  # Runs on every push & PR. Independent of every other job.
  # ───────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: 🔧 Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: 🔧 Run generate service-play-json
        run: ./gradlew --init-script gradle/init-ci.gradle.kts

      - name: 🧪 Run unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace

      - name: 📊 Publish unit test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: '**/build/test-results/testDebugUnitTest/TEST-*.xml'
          check_name: 📋 Unit Test Results — App
          comment_title: 🧪 Unit Test Report — :app module
          comment_mode: always

      - name: 📄 Upload test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-report
          path: '**/build/reports/tests/testDebugUnitTest/**'
          retention-days: 7
          if-no-files-found: ignore

  # ───────────────────────────────────────────────────────────────────────────
  # STEP 2 — Instrumented Android Tests (Emulator)
  # Depends on unit-tests + check-tag to skip expensive emulator runs
  # when either prerequisite fails. (3 first jobs run in parallel where
  # possible; android-tests depend on the other two by design.)
  # ───────────────────────────────────────────────────────────────────────────
  android-tests:
    name: 🤖 Android Tests (API ${{ matrix.api-level }})
    needs: [unit-tests, check]
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      checks: write
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - api-level: 30
            target: google_apis
          - api-level: 34
            target: google_apis

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 🔧 Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐘 Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: 📱 AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-prefixapp-${{ matrix.api-level }}-${{ matrix.target }}

      - name: 🏗️ Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          emulator-boot-timeout: 300
          script: echo "✅ AVD snapshot generated for caching (API ${{ matrix.api-level }})"

      - name: 🔧 Make gradlew executable
        run: chmod +x ./gradlew

      - name: 🔧 Run generate service-play-json
        run: ./gradlew --init-script gradle/init-ci.gradle.kts

      - name: 🧪 Run :app instrumented tests (API ${{ matrix.api-level }})
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          emulator-boot-timeout: 300
          script: ./gradlew :app:connectedDebugAndroidTest --no-daemon --warning-mode none --console=plain --stacktrace

      - name: 📊 Publish instrumented test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: '**/build/outputs/androidTest-results/**/*.xml'
          check_name: 📋 Instrumented Results — API ${{ matrix.api-level }}
          comment_title: 🤖 Instrumented Test Report (API ${{ matrix.api-level }})
          comment_mode: always

      - name: 📄 Upload HTML report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-test-report-api${{ matrix.api-level }}-${{ github.run_number }}
          path: '**/build/reports/androidTests/connected/'
          retention-days: 30
          if-no-files-found: ignore

